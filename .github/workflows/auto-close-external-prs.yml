name: Auto-close External PRs

on:
  pull_request_target:
    types: [opened]

jobs:
  auto-close:
    runs-on: ubuntu-latest
    if: github.event.pull_request.user.login != github.repository_owner && github.actor != 'dependabot[bot]' && github.actor != 'copilot[bot]'

    permissions:
      pull-requests: write
      issues: write

    steps:
      - name: Close PR with message
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const message = `This is a private internal fork. External pull requests are not accepted and will be closed automatically.`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: message
            });

            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              state: 'closed'
            });
